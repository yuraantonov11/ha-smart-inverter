name: Build Android APK & AAB

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (apk, aab, or both)'
        required: true
        default: 'both'
        type: choice
        options:
          - apk
          - aab
          - both

permissions:
  contents: read

jobs:
  build_android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.3'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      - name: Build Flutter
        run: flutter build apk --release --split-per-abi

      - name: Build Flutter AAB (if enabled)
        if: github.event.inputs.build_type == 'aab' || github.event.inputs.build_type == 'both'
        run: flutter build appbundle --release

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          if [ -d "build/app/outputs/flutter-apk" ]; then
            cp build/app/outputs/flutter-apk/app-*.apk artifacts/ 2>/dev/null || true
          fi
          if [ -f "build/app/outputs/bundle/release/app-release.aab" ]; then
            cp build/app/outputs/bundle/release/app-release.aab artifacts/
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk-build-${{ github.run_id }}
          path: artifacts/app-*.apk
          retention-days: 30

      - name: Upload AAB as artifact
        uses: actions/upload-artifact@v4
        if: success() && (github.event.inputs.build_type == 'aab' || github.event.inputs.build_type == 'both')
        with:
          name: android-aab-build-${{ github.run_id }}
          path: artifacts/app-release.aab
          retention-days: 30


  build_status:
    name: Build Status Notification
    runs-on: ubuntu-latest
    needs: build_android
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build_android.result }}" == "success" ]; then
            echo "✅ Android build completed successfully!"
            exit 0
          else
            echo "❌ Android build failed!"
            exit 1
          fi

