name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows App
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Build Inno Setup Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\installer_script.iss

      - name: Package Release Files
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version -eq "" -or $version -match "main") { $version = "latest" }
          
          # Rename setup file to include version
          Move-Item -Path "windows\Output\smart_inverter_setup.exe" -Destination "smart_inverter_setup_$version.exe"
          
          # Prepare ZIP for manual installation
          $release_dir = "build\windows\x64\runner\Release"
          mkdir release_zip
          copy-item -Path "$release_dir\*" -Destination "release_zip" -Recurse -Exclude "*.msix"
          compress-archive -Path "release_zip\*" -DestinationPath "smart_inverter_windows_$version.zip"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            smart_inverter_setup_*.exe
            smart_inverter_windows_*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
