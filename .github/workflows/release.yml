name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.3'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Build Inno Setup Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\installer_script.iss

      - name: Build MSIX Package
        run: flutter pub run msix:create

      - name: Package Release Files
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version -eq "" -or $version -match "main") { $version = "latest" }
          
          # Rename setup file to include version
          Move-Item -Path "windows\Output\smart_inverter_setup.exe" -Destination "smart_inverter_setup_$version.exe"

          # Rename MSIX package to include version
          Move-Item -Path "build\windows\x64\runner\Release\inverter_app.msix" -Destination "smart_inverter_app_$version.msix"
          
          # Prepare ZIP for manual installation
          $release_dir = "build\windows\x64\runner\Release"
          mkdir release_zip
          copy-item -Path "$release_dir\*" -Destination "release_zip" -Recurse -Exclude "*.msix"
          compress-archive -Path "release_zip\*" -DestinationPath "smart_inverter_windows_$version.zip"

      - name: Create or Update Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $title = $tag
          $notesFile = Join-Path $env:RUNNER_TEMP "release_notes.md"

          @"
          Automated release for $tag

          Assets:
          - Windows installer (.exe)
          - Windows package (.msix)
          - Portable Windows build (.zip)
          "@ | Set-Content -Path $notesFile -Encoding UTF8

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag smart_inverter_setup_*.exe smart_inverter_app_*.msix smart_inverter_windows_*.zip --clobber
          } else {
            gh release create $tag smart_inverter_setup_*.exe smart_inverter_app_*.msix smart_inverter_windows_*.zip --title $title --notes-file $notesFile
          }
