name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.29.0' # Adjust to latest stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows
        run: |
          mkdir release
          copy-item -Path "build\windows\x64\runner\Release\*" -Destination "release" -Recurse
          compress-archive -Path "release\*" -DestinationPath "smart_inverter_windows_v${{ github.ref_name }}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: smart_inverter_windows_v${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
