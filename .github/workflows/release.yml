name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Generate MSIX Installer
        run: dart run msix:create --display-name "Smart Inverter" --publisher-display-name "Yura Antonov" --msix-version 1.1.0.0

      - name: Package Release Files
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version -eq "" -or $version -match "main") { $version = "latest" }
          
          # Prepare ZIP
          $release_dir = "build\windows\x64\runner\Release"
          mkdir release_zip
          copy-item -Path "$release_dir\*" -Destination "release_zip" -Recurse -Exclude "*.msix"
          compress-archive -Path "release_zip\*" -DestinationPath "smart_inverter_windows_$version.zip"
          
          # Find and move MSIX
          $msix_file = Get-ChildItem -Path "$release_dir\*.msix" | Select-Object -First 1
          if ($msix_file) {
            Move-Item -Path $msix_file.FullName -Destination "smart_inverter_installer_$version.msix"
          } else {
            Write-Error "MSIX file not found in $release_dir"
            exit 1
          }

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            smart_inverter_windows_*.zip
            smart_inverter_installer_*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
