name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.3

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $rawVersion = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}".TrimStart('v') } else { "dev-${{ github.run_number }}" }
          $releaseVersion = ($rawVersion -split '\+')[0]
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$releaseVersion" "windows\installer_script.iss"

      - name: Build MSIX package
        run: flutter pub run msix:create

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          $rawVersion = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}".TrimStart('v') } else { "dev-${{ github.run_number }}" }
          $releaseVersion = ($rawVersion -split '\+')[0]
          New-Item -Path artifacts -ItemType Directory -Force | Out-Null

          Copy-Item "windows\Output\smart_inverter_setup.exe" "artifacts\smart_inverter_setup_$releaseVersion.exe" -Force
          Copy-Item "build\windows\x64\runner\Release\inverter_app.msix" "artifacts\smart_inverter_v$releaseVersion.msix" -Force

          $portableDir = "windows_portable"
          Remove-Item -Path $portableDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -Path $portableDir -ItemType Directory | Out-Null
          Copy-Item -Path "build\windows\x64\runner\Release\*" -Destination $portableDir -Recurse -Exclude "*.msix"
          Compress-Archive -Path "$portableDir\*" -DestinationPath "artifacts\inverter_app_portable_$releaseVersion.zip" -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: artifacts/*
          retention-days: 14

  build_android:
    name: Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.29.3

      - name: Install dependencies
        run: flutter pub get

      - name: Validate release version policy
        run: |
          PUBSPEC_VERSION=$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | head -n1 | tr -d '\r' | xargs)
          if [[ -z "$PUBSPEC_VERSION" ]]; then
            echo "pubspec version not found"
            exit 1
          fi

          if ! [[ "$PUBSPEC_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "pubspec version must be X.Y.Z, got: $PUBSPEC_VERSION"
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "$TAG_VERSION" != "$PUBSPEC_VERSION" ]]; then
              echo "tag version ($TAG_VERSION) must equal pubspec version ($PUBSPEC_VERSION)"
              exit 1
            fi
          fi

      - name: Compute Android build metadata
        run: |
          PUBSPEC_VERSION=$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | head -n1 | tr -d '\r' | xargs)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$PUBSPEC_VERSION"
          BUILD_CODE=$((10#$MAJOR * 10000 + 10#$MINOR * 100 + 10#$PATCH))

          echo "ANDROID_BUILD_NAME=$PUBSPEC_VERSION" >> "$GITHUB_ENV"
          echo "ANDROID_BUILD_CODE=$BUILD_CODE" >> "$GITHUB_ENV"
          echo "Computed Android build: name=$PUBSPEC_VERSION code=$BUILD_CODE"

      - name: Configure Android release signing
        if: startsWith(github.ref, 'refs/tags/')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -z "$ANDROID_KEYSTORE_BASE64" || -z "$ANDROID_KEYSTORE_PASSWORD" || -z "$ANDROID_KEY_ALIAS" || -z "$ANDROID_KEY_PASSWORD" ]]; then
            echo "Missing Android signing secrets. Release APK would be signed with debug key and break updates."
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - name: Build Android APK (release)
        if: startsWith(github.ref, 'refs/tags/')
        run: flutter build apk --release --build-name "$ANDROID_BUILD_NAME" --build-number "$ANDROID_BUILD_CODE"

      - name: Build Android APK (debug for CI)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: flutter build apk --debug --build-name "$ANDROID_BUILD_NAME" --build-number "$ANDROID_BUILD_CODE"

      - name: Build Android AAB
        if: startsWith(github.ref, 'refs/tags/')
        run: flutter build appbundle --release --build-name "$ANDROID_BUILD_NAME" --build-number "$ANDROID_BUILD_CODE"

      - name: Package Android artifacts
        run: |
          PUBSPEC_VERSION=$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | head -n1 | tr -d '\r' | xargs)
          mkdir -p artifacts

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RAW_VERSION="$PUBSPEC_VERSION"
            RELEASE_VERSION="$RAW_VERSION"
            cp build/app/outputs/flutter-apk/app-release.apk "artifacts/smart_inverter_android_v${RAW_VERSION}.apk"
            cp build/app/outputs/bundle/release/app-release.aab "artifacts/smart_inverter_android_v${RELEASE_VERSION}.aab"
          else
            RAW_VERSION="ci-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
            cp build/app/outputs/flutter-apk/app-debug.apk "artifacts/smart_inverter_android_${RAW_VERSION}.apk"
          fi

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-assets
          path: artifacts/*
          retention-days: 14

  publish_release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [build_windows, build_android]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-assets
          path: release_assets

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-assets
          path: release_assets

      - name: Generate SHA256 checksums
        working-directory: release_assets
        run: sha256sum * > SHA256SUMS.txt

      - name: Prepare release notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          FULL_VERSION="${TAG_NAME#v}"
          VERSION="${FULL_VERSION%%+*}"
          NOTES_FILE="release_notes_${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" release_notes.md
          else
            cat > release_notes.md <<EOF
          Smart Inverter App $TAG_NAME

          Automated multi-platform release.

          Included assets:
          - Windows installer (.exe)
          - Windows MSIX (.msix)
          - Windows portable (.zip)
          - Android APK (.apk)
          - Android App Bundle (.aab)
          - SHA256SUMS.txt
          EOF
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release_assets/* --clobber
            gh release edit "$TAG_NAME" --notes-file release_notes.md
          else
            gh release create "$TAG_NAME" release_assets/* --title "Smart Inverter App $TAG_NAME" --notes-file release_notes.md
          fi
