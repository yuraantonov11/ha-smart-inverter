name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Дозволяє запускати білд вручну через інтерфейс GitHub

permissions:
  contents: write # Необхідно для створення релізу та завантаження файлів

jobs:
  build:
    name: Build Windows App
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows
        run: |
          $version = "${{ github.ref_name }}"
          if ($version -eq "main") { $version = "latest" }
          mkdir release
          copy-item -Path "build\windows\x64\runner\Release\*" -Destination "release" -Recurse
          compress-archive -Path "release\*" -DestinationPath "smart_inverter_windows_$version.zip"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: smart_inverter_windows_${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
