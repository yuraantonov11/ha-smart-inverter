<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <style>
      @keyframes flow1 { 0%{stroke-dashoffset:24} 100%{stroke-dashoffset:0} }
      @keyframes flow2 { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-24} }
      @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
      .line { fill:none; stroke-width:3; stroke-dasharray:8 4; }
      .line-solar { stroke:#f59e0b; animation:flow1 1s linear infinite; }
      .line-grid { stroke:#6b7280; animation:flow2 1.2s linear infinite; }
      .line-battery { stroke:#10b981; animation:flow1 .8s linear infinite; }
      .node-text { font-family:sans-serif; text-anchor:middle; font-size:12px; fill:#9ca3af; }
      .node-title { font-size:11px; fill:#6b7280; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="var(--card-background-color,#1e1e2e)"/>
  <!-- Sun -->
  <circle cx="40" cy="45" r="20" fill="#f59e0b" opacity=".2"/>
  <circle cx="40" cy="45" r="12" fill="#f59e0b"/>
  <!-- Solar panel -->
  <rect x="10" y="70" width="55" height="6" rx="2" fill="#3b82f6"/>
  <rect x="10" y="80" width="55" height="6" rx="2" fill="#3b82f6"/>
  <rect x="10" y="90" width="55" height="6" rx="2" fill="#3b82f6"/>
  <text x="38" y="110" class="node-text">☀️ PV</text>
  <!-- House -->
  <polygon points="180,90 220,60 260,90" fill="none" stroke="#6b7280" stroke-width="2"/>
  <rect x="195" y="90" width="50" height="45" fill="none" stroke="#6b7280" stroke-width="2"/>
  <rect x="210" y="110" width="20" height="25" fill="none" stroke="#6b7280" stroke-width="1.5" rx="2"/>
  <text x="220" y="152" class="node-text">🏠 Дім</text>
  <!-- Grid tower -->
  <line x1="340" y1="60" x2="340" y2="120" stroke="#6b7280" stroke-width="2"/>
  <line x1="320" y1="70" x2="360" y2="70" stroke="#6b7280" stroke-width="2"/>
  <line x1="320" y1="90" x2="360" y2="90" stroke="#6b7280" stroke-width="2"/>
  <line x1="326" y1="70" x2="314" y2="90" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="354" y1="70" x2="366" y2="90" stroke="#6b7280" stroke-width="1.5"/>
  <text x="340" y="140" class="node-text">🔌 Мережа</text>
  <!-- Battery -->
  <rect x="145" y="180" width="50" height="28" rx="4" fill="none" stroke="#10b981" stroke-width="2"/>
  <rect x="158" y="172" width="24" height="8" rx="2" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <rect x="150" y="185" width="18" height="18" rx="2" fill="#10b981" opacity=".3"/>
  <text x="170" y="225" class="node-text">🔋 АКБ</text>
  <!-- Connection lines -->
  <path d="M 65 85 Q 130 70, 195 90" class="line line-solar"/>
  <path d="M 245 90 Q 290 75, 340 90" class="line line-grid"/>
  <path d="M 220 135 Q 220 155, 195 180" class="line line-battery"/>
  <path d="M 195 195 Q 250 185, 310 120" class="line line-battery"/>
  <!-- Animated dots -->
  <circle r="4" fill="#f59e0b" class="line-solar" style="animation:flow1 1s linear infinite;">
    <animateMotion dur="2s" repeatCount="indefinite" path="M 65 85 Q 130 70, 195 90"/>
  </circle>
  <circle r="4" fill="#10b981" style="animation:flow1 .8s linear infinite;">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M 220 135 Q 220 155, 195 180"/>
  </circle>
</svg>